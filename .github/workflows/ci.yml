name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies and Faust
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y faust libasound2-dev libx11-dev libxcb1-dev

      - name: Install Faust on macOS
        if: runner.os == 'macOS'
        run: brew install faust

      - name: Configure libclang on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Mojo on Linux
        if: matrix.os == 'ubuntu-latest'
        run: modular install mojo

      - name: Build release
        run: cargo build --release

      - name: Test release
        run: cargo test --release

  linux-quality:
    name: Format and Clippy (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with lint components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies and Faust
        run: |
          sudo apt-get update
          sudo apt-get install -y faust libasound2-dev libx11-dev libxcb1-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  windows-asio:
    name: Windows ASIO (${{ matrix.os }})
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    env:
      CPAL_ASIO_DIR: ${{ github.workspace }}\asio-sdk
      LIBCLANG_PATH: C:\Program Files\LLVM\bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached ASIO SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.CPAL_ASIO_DIR }}
          key: asio-sdk-${{ runner.os }}

      - name: Build and test with ASIO
        run: cargo test --release --features asio
